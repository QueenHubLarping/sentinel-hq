  <script>
    const rawNodes = [{"id": "c1e5cd0d-08fc-5261-8122-d43a1024b1c3", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782640751646, \"updated_at\": 1782640751646, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"27732d457c0b8e6d8814ab8323578787\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This chunk is about the ADR (Architecture Decision Record) for using asynchronous email dispatch via a queue. \\n               The key points are: \\n               - The decision to use Redis/Celery async dispatch was made to reduce checkout latency and improve email reliability. \\n               - The approach removes the SMTP block from the critical path, resulting in a 38% reduction in checkout latency. \\n               - The solution includes exponential backoff retries and observable failures via Celery Flower, but introduces operational overhead.\", \"source_chunk_id\": \"e1478b7c-346c-5406-917b-b59ee60ab7a0\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "e1478b7c-346c-5406-917b-b59ee60ab7a0", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782640750863, \"updated_at\": 1782640750863, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"27732d457c0b8e6d8814ab8323578787\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: ADR] [file: ADR-001-async-email.md]\\n\\n# ADR-001: Use Asynchronous Email Dispatch via Queue\\n\\n**Status:** Accepted  \\n**Date:** 2024-08-14  \\n**Author:** @priya-sharma  \\n**Component:** email_service  \\n\\n## Context\\n\\nThe `/checkout` endpoint was measured at 1,340ms p95 latency. Profiling showed that 800ms\\nof that came from blocking SMTP calls to SendGrid inside the request-response cycle.\\nThe team explored three options:\\n\\n1. Keep synchronous SMTP \\u2014 simple code, but blocks the HTTP worker.\\n2. Fire-and-forget thread \\u2014 easy to implement, no retry on failure.\\n3. Push to a task queue (Redis + Celery) \\u2014 async dispatch with retry, observable.\\n\\n## Decision\\n\\nWe adopt **option 3: Redis/Celery async dispatch**.\\n\\nEmail sending is pushed onto a Celery queue. The checkout endpoint returns 200 immediately\\nafter writing the order to the database. A background worker handles SMTP with exponential\\nbackoff (3 retries, max 1 min delay).\\n\\n## Consequences\\n\\n- **Positive:** Checkout p95 latency drops from 1,340ms to ~540ms (38% improvement). \\n  Users get instant confirmation. Workers can be scaled independently.\\n- **Positive:** Failed emails are retried automatically; failures are observable via Celery Flower.\\n- **Negative:** Email delivery is no longer guaranteed within the same transaction.\\n  If the queue crashes between order write and email dispatch, no email is sent.\\n  Mitigated by a daily reconciliation job that resends missing confirmation emails.\\n- **Negative:** Adds operational overhead: Redis + Celery must be deployed and monitored.\\n\\n## Rationale (the WHY)\\n\\nThe 800ms SMTP block was the single biggest latency driver in checkout. Async dispatch\\nremoves it from the critical path entirely. We chose the queue approach over fire-and-forget\\nthreads because observability and retry logic are non-negotiable for transactional email.\\nThe operational cost of Redis/Celery is justified by the latency gain and the reliability\\nguarantee the queue provides.\\n\\nThis is a deliberate, non-obvious choice. Synchronous email is the \\\"simpler\\\" path \\u2014\\nbut simplicity here trades user-perceived speed and reliability for convenience.\\nThat trade is wrong for a checkout flow.\", \"chunk_size\": 554, \"chunk_index\": 0, \"cut_type\": \"sentence_end\", \"document_id\": \"7a2e6c1e-ba11-528f-8789-fda97cb4bba0\", \"document_name\": \"text_27732d457c0b8e6d8814ab8323578787\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "71d460b2-5d8b-52c3-9f4f-dbc335310328", "label": "adr-001", "title": "{\"name\": \"adr-001\", \"type\": \"Entity\", \"created_at\": 1782640752942, \"updated_at\": 1782640752942, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Architecture Decision Record for email dispatch approach\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "3d897781-1f4f-59f0-9622-97d2f17ed585", "label": "document", "title": "{\"name\": \"document\", \"type\": \"EntityType\", \"created_at\": 1782640752942, \"updated_at\": 1782640752942, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"document\", \"relations\": []}"}, {"id": "79daa7c4-b3a7-57e4-817e-113aa0bdc027", "label": "email_service", "ti moves email sending out of the HTTP request-response cycle and uses a Celery worker for SMTP dispatch.\\n    - The checkout endpoint now returns 200 immediately after writing the order to the database.\\n    - A daily job resends missing confirmation emails.\", \"source_chunk_id\": \"d73fd3f0-77e5-5df0-97fe-900ff1aa4d2a\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "d73fd3f0-77e5-5df0-97fe-900ff1aa4d2a", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782640750874, \"updated_at\": 1782640750874, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"2fb1b2c3cd691ac485d7b897d07baeca\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: PR] [file: PR-42-implement-async-email.md]\\n\\n# PR #42 \\u2014 feat: async email dispatch via Redis/Celery queue\\n\\n**Author:** @priya-sharma  \\n**Date:** 2024-08-16  \\n**Status:** Merged  \\n**Component:** email_service  \\n\\n## Summary\\n\\nImplements the async email dispatch architecture decided in ADR-001.\\n\\nMoves email sending out of the HTTP request-response cycle. The checkout endpoint\\nnow returns 200 immediately after writing the order to the database. A Celery worker\\nhandles SMTP dispatch with exponential backoff (3 retries, max 60s delay).\\n\\n## Changes\\n\\n- `email_service/tasks.py`: new Celery task `send_order_confirmation(order_id)`\\n- `checkout/views.py`: remove direct `send_email()` call; replace with `send_order_confirmation.delay(order.id)`\\n- `email_service/worker.py`: Celery app config with Redis broker\\n- `reconciliation/jobs.py`: daily job to resend missing confirmation emails\\n- `docker-compose.yml`: add `celery-worker` and `celery-beat` services\\n\\n## Benchmarks\\n\\n| Metric | Before | After |\\n|--------|--------|-------|\\n| Checkout p95 latency | 1,340ms | 541ms |\\n| Email delivery rate | 99.1% (sync) | 99.7% (async + retry) |\\n\\n## Implements\\n\\nADR-001: Use Asynchronous Email Dispatch via Queue\", \"chunk_size\": 392, \"chunk_index\": 0, \"cut_type\": \"sentence_cut\", \"document_id\": \"277bd81a-2029-5f79-8e20-28b4a3808acc\", \"document_name\": \"text_2fb1b2c3cd691ac485d7b897d07baeca\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "9d8b0306-5bee-5f9d-bb41-9cd0c49cb570", "label": "pr #42", "title": "{\"name\": \"pr #42\", \"type\": \"Entity\", \"created_at\": 1782640752888, \"updated_at\": 1782640752888, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"feat: async email dispatch via Redis/Celery queue\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "b4d68b27-2930-50d9-a3ff-a6a61147a998", "label": "pull request", "title": "{\"name\": \"pull request\", \"type\": \"EntityType\", \"created_at\": 1782640752888, \"updated_at\": 1782640752888, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"pull request\", \"relations\": []}"}, {"id": "4b514ba8-4709-5698-9d9e-28920dd1f6fa", "label ies: None, Topics: Email dispatch approach, checkout latency fix. \\n   Facts: \\n   - Ravi Menon questioned the use of Celery/Redis over a background thread for email dispatch.\\n   - Priya Sharma explained the benefits of using Celery/Redis, including retry with backoff and Flower monitoring.\\n   - Daniel Osei agreed with Priya, citing the significant impact of latency on checkout conversion rates.\", \"source_chunk_id\": \"2aeeb1ba-e5aa-5f6f-981f-43e923f680f3\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "2aeeb1ba-e5aa-5f6f-981f-43e923f680f3", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782640750869, \"updated_at\": 1782640750869, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"5e43869208f4be231ff75094e8a07e00\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: Slack] [file: slack-2024-08-email-decision.md]\\n\\n# Slack Export \\u2014 #backend-decisions \\u2014 August 2024\\n\\n**Channel:** #backend-decisions  \\n**Date:** 2024-08-13  \\n**Topic:** Email dispatch approach for checkout latency fix\\n\\n---\\n\\n**@ravi-menon** [10:02 AM]  \\nQuick question before Priya writes the ADR \\u2014 why are we going with Celery/Redis instead of\\njust a background thread? Threads are simpler to deploy.\\n\\n**@priya-sharma** [10:07 AM]  \\nThree reasons: (1) Celery gives us retry with backoff \\u2014 a thread that fails just silently\\ndrops the email. (2) Flower monitoring means we can actually see what's in the queue.\\n(3) We're already running Redis for sessions; adding a Celery worker is low marginal cost.\\n\\n**@ravi-menon** [10:11 AM]  \\nFair point on the retry. What about the transaction boundary issue? Order written, queue\\npush fails, customer gets no email?\\n\\n**@priya-sharma** [10:15 AM]  \\nWe'll add a daily reconciliation job. Scans orders with no sent_at timestamp older than\\n10 minutes, resends. It's a safety net, not the primary flow. But yes \\u2014 this decision\\ndeliberately gives up same-transaction email guarantees. That's the trade.\\n\\n**@daniel-osei** [10:20 AM]  \\nAgree with Priya. The 800ms block is absolutely killing checkout conversion. We saw a 6%\\ndrop in completions above 1.2s in last quarter's A/B. Async is the right call.\\n\\n**@ravi-menon** [10:22 AM]  \\nOK I'm convinced. Do NOT let anyone \\\"simplify\\\" this back to synchronous later without\\nreading the ADR first. The latency numbers are the whole reason.\\n\\n**@priya-sharma** [10:24 AM]  \\n+1. Writing ADR-001 now. The rationale lives there.\", \"chunk_size\": 468, \"chunk_index\": 0, \"cut_type\": \"sentence_end\", \"document_id\": \"30bf93cb-30d7-5f4b-86d2-149794a88a0e\", \"document_name\": \"text_5e43869208f4be231ff75094e8a07e00\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "c67c1f42-d599-5ca7-a407-ac37e4012df6", "label": "ravi menon", "title": "{\"name\": \"ravi menon\", \"type\": \"Entity\", \"created_at\": 1782640752941, \"updated_at\": 1782640752941, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"A team member\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "e250ab97-2a0e-57ce-ad09-ea2d41f37bb6", "label": "backend-decisions", "title": "{\"name\": \"backend-decisions\", \"type\": \"Entity\", \"create
