    const rawNodes = [{"id": "ac6bbc8e-6c69-53bf-a635-7796ba0f670d", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639469093, \"updated_at\": 1782639469093, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"0dbac23bb7c6171b24c39f8b193e49ac\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This chunk is about People: @ravi-menon, Companies: None, Places: None, Roles: None, Projects: PR #19, Products: Nginx, Systems: api_gateway, Concepts: rate limiting, Events: None, Topics: gateway-level rate limiting. \\n   Facts: \\n   - @ravi-menon authored PR #19 on 2024-03-28.\\n   - The PR implements gateway-level rate limiting using Nginx limit_req.\\n   - The PR removes django-ratelimit decorators from search and products views.\", \"source_chunk_id\": \"4cbe7460-2fca-5d1e-9751-9b5c6a4cc402\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "4cbe7460-2fca-5d1e-9751-9b5c6a4cc402", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468123, \"updated_at\": 1782639468123, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"0dbac23bb7c6171b24c39f8b193e49ac\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: PR] [file: PR-19-gateway-rate-limit.md]\\n\\n# PR #19 \\u2014 ops: add gateway-level rate limiting (Nginx limit_req)\\n\\n**Author:** @ravi-menon  \\n**Date:** 2024-03-28  \\n**Status:** Merged  \\n**Component:** api_gateway, infra  \\n\\n## Summary\\n\\nImplements the rate-limiting strategy from ADR-003. Adds `limit_req_zone` rules to the\\nNginx gateway config. Removes the `django-ratelimit` decorators that were temporarily\\nadded to `/search` and `/products` as an emergency patch after the scraping incident.\\n\\n## Changes\\n\\n- `infra/nginx/api.conf`: `limit_req_zone` on `$binary_remote_addr`; `/search` capped at\\n  30 req/s per IP with burst=10; `/api/` global at 100 req/s per IP with burst=50\\n- `infra/nginx/errors.conf`: custom 429 JSON response body with `Retry-After` header\\n- `docker-compose.yml`: dev gateway service (`nginx:alpine`) with hot-reload on config change\\n- `requirements.txt`: remove `django-ratelimit==4.1.0`\\n- `search/views.py`, `products/views.py`: **remove** `@ratelimit` decorators (gateway owns this now)\\n- `docs/runbooks/rate-limit-tuning.md`: how to adjust limits without a code deploy\\n\\n## Key point\\n\\nThe `@ratelimit` decorators on `search/views.py` and `products/views.py` are intentionally\\ndeleted in this PR \\u2014 they were a stopgap, not the architecture. Rate limiting in application\\ncode is explicitly out-of-scope per ADR-003. Do not re-add them.\\n\\n## Load test (locust, 500 virtual users, 10s ramp)\\n\\n| Scenario | Without gateway limit | With gateway limit |\\n|----------|-----------------------|--------------------|\\n| Peak req/s reaching Django workers | 11,800 | 312 |\\n| Worker pool saturation | Yes (100%) | No (28%) |\\n| p99 latency for legit users | 8,100ms | 420ms |\\n\\n## Implements\\n\\nADR-003: Enforce Rate Limiting at the API Gateway, Not in Application Code\\n\", \"chunk_size\": 613, \"chunk_index\": 0, \"cut_type\": \"sentence_cut\", \"document_id\": \"bb2e2891-961c-5b9f-8906-6a746e7013fe\", \"document_name\": \"text_0dbac23bb7c6171b24c39f8b193e49ac\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "f78b33a3-a29f-5052-a processing\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "cca61dbb-0e3d-5b0b-9098-fc254ce885e7", "label": "service", "title": "{\"name\": \"service\", \"type\": \"EntityType\", \"created_at\": 1782639528890, \"updated_at\": 1782639528890, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"service\", \"relations\": []}"}, {"id": "914502ac-295c-5e36-bccd-90958846633b", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639469061, \"updated_at\": 1782639469061, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"b1847445f599377ba8444a7ee351b5b9\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This chunk is about People: @daniel-osei, Companies: None, Topics: migration to PostgreSQL. \\n              Facts: \\n              - @daniel-osei authored the PR #31 to migrate orders and payments to PostgreSQL on 2024-05-14.\\n              - The PR #31 was merged and replaced MongoDB collections with PostgreSQL tables for financial and order-state data.\", \"source_chunk_id\": \"fffa46b5-65b2-5706-b87f-fcb5fb00feb9\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "fffa46b5-65b2-5706-b87f-fcb5fb00feb9", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468166, \"updated_at\": 1782639468166, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"b1847445f599377ba8444a7ee351b5b9\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: PR] [file: PR-31-migrate-to-postgres.md]\\n\\n# PR #31 \\u2014 chore: migrate orders + payments to PostgreSQL\\n\\n**Author:** @daniel-osei  \\n**Date:** 2024-05-14  \\n**Status:** Merged  \\n**Component:** orders_service, payments_service  \\n\\n## Summary\\n\\nImplements the storage decision from ADR-002. Replaces MongoDB collections\\n(`orders_v1`, `payments_v1`) with PostgreSQL tables. All financial and order-state\\ndata now lives in Postgres with full ACID semantics.\\n\\n## Changes\\n\\n- `orders/models.py`: Django ORM models for `Order`, `OrderLine`, `Refund`\\n- `payments/models.py`: `Payment`, `PaymentEvent` tables with FK constraints to `Order`\\n- `migrations/`: Alembic migration scripts (0031_orders_to_pg.py)\\n- `orders/repositories.py`: replace PyMongo queries with SQLAlchemy queries\\n- `payments/repositories.py`: same\\n- `docker-compose.yml`: swap `mongo` service for `postgres:16`\\n- `scripts/migrate_mongo_to_pg.py`: one-time data migration script (run once, delete after)\\n- `tests/`: updated fixtures; added transaction-rollback tests for payment failure paths\\n\\n## Why not just add Postgres alongside Mongo?\\n\\nDual-write during migration was considered and rejected. It doubles the failure surface\\nand leaves us with two sources of truth. We did a maintenance-window migration instead:\\nexport Mongo \\u2192 transform \\u2192 bulk-insert Postgres. Tested against a staging snapshot first.\\n\\n## Benchmark (staging, 500k order records)\\n\\n| Metric | MongoDB | PostgreSQL |\\n|--------|---------|------------|\\n| Order + Payment write (2-table atomic) | ~3.1ms (app-level \\\"transaction\\\") | 2.4ms (real transaction) |\\n| Refund with FK integrity check | N/A (app-enforced) | 2.8ms (DB-enforced) |\\n| Corrupt write rate (chaos test) | 0.4% silent bad state | 0% (constraint rejected) |\\n\\nThe 0.4% figure from the Mongo chaos test was the decisive number \\u2014 those were real data\\nintegrity failures that would have required manual reconciliation.\\n\\n## Implements\\n\\nADR-002: Use PostgreSQL for Transactional Order Data\\n\", \"chunk_size\": 606, \"chunk_index\": 0, \"cut_type\": \"sentence_cut\", \"document_id\": \"e2a7b38e-3335-5308-a4ce-cf26fde57b84\", \"document_name\": \"text_b1847445f599377ba8444a7ee351b5b9\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "86bc5f8e-b350-57bd-a2bf-f98e84820a07", "label": "daniel osei", "title": "{\"name\": \"daniel osei\", \"type\": \"Entity\", \"created_at\": 1782639594120, \"updated_at\": 1782639594120, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Team member\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "d46e4ebc-2465-5fa6-a393-68de47933637", "label": "pr #31", "title": "{\"name\": \"pr #31\", \"type\": \"Entity\", \"created_at\": 1782639470005, \"updated_at\": 1782639470005, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_ h_epoch\": null}"}, {"id": "e2a7b38e-3335-5308-a4ce-cf26fde57b84", "label": "text_b1847445f599377ba8444a7ee351b5\u2026", "title": "{\"name\": \"text_b1847445f599377ba8444a7ee351b5b9\", \"type\": \"TextDocument\", \"created_at\": 1782639468158, \"updated_at\": 1782639468158, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 1, \"metadata\": {\"index_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"classify_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"b1847445f599377ba8444a7ee351b5b9\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"raw_data_location\": \"file:///C:/Users/LENOVO/AppData/Local/Programs/Python/Python314/Lib/site-packages/cognee/.data_storage/text_b1847445f599377ba8444a7ee351b5b9.txt\", \"external_metadata\": \"{}\", \"mime_type\": \"text/plain\"}"}, {"id": "8fa0a4e4-6beb-561a-8d0c-73adc9bf515a", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639469172, \"updated_at\": 1782639469172, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"5e43869208f4be231ff75094e8a07e00\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This chunk is about People: Ravi Menon, Priya Sharma, Daniel Osei, Companies: None, Topics: Email dispatch approach, checkout latency fix. \\n   Facts: \\n   - Priya Sharma is writing an ADR for the email dispatch approach. \\n   - The team decided to use Celery/Redis for email dispatch due to its retry and monitoring capabilities. \\n   - A daily reconciliation job will be added to resend emails for orders with no sent_at timestamp older than 10 minutes.\", \"source_chunk_id\": \"db63449d-f9bb-5e07-b909-a058ce58c13c\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "db63449d-f9bb-5e07-b909-a058ce58c13c", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468189, \"updated_at\": 1782639468189, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"5e43869208f4be231ff75094e8a07e00\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: Slack] [file: slack-2024-08-email-decision.md]\\n\\n# Slack Export \\u2014 #backend-decisions \\u2014 August 2024\\n\\n**Channel:** #backend-decisions  \\n**Date:** 2024-08-13  \\n**Topic:** Email dispatch approach for checkout latency fix\\n\\n---\\n\\n**@ravi-menon** [10:02 AM]  \\nQuick question before Priya writes the ADR \\u2014 why are we going with Celery/Redis instead of\\njust a background thread? Threads are simpler to deploy.\\n\\n**@priya-sharma** [10:07 AM]  \\nThree reasons: (1) Celery gives us retry with backoff \\u2014 a thread that fails just silently\\ndrops the email. (2) Flower monitoring means we can actually see what's in the queue.\\n(3) We're already running Redis for sessions; adding a Celery worker is low marginal cost.\\n\\n**@ravi-menon** [10:11 AM]  \\nFair point on the retry. What about the transaction boundary issue? Order written, queue\\npush fails, customer gets no email?\\n\\n**@priya-sharma** [10:15 AM]  \\nWe'll add a daily reconciliation job. Scans orders with no sent_at timestamp older than\\n10 minutes, resends. It's a safety net, not the primary flow. But yes \\u2014 this decision\\ndeliberately gives up same-transaction email guarantees. That's the trade.\\n\\n**@daniel-osei** [10:20 AM]  \\nAgree with Priya. The 800ms block is absolutely killing checkout conversion. We saw a 6%\\ndrop in completions above 1.2s in last quarter's A/B. Async is the right call.\\n\\n**@ravi-menon** [10:22 AM]  \\nOK I'm convinced. Do NOT let anyone \\\"simplify\\\" this back to synchronous later without\\nreading the ADR first. The latency numbers are the whole reason.\\n\\n**@priya-sharma** [10:24 AM]  \\n+1. Writing ADR-001 now. The rationale lives there.\", \"chunk_size\": 468, \"chunk_index\": 0, \"cut_type\": \"sentence_end\", \"document_id\": \"e216e0a7-0d35-543d-a41a-e5521b131db4\", \"document_name\": \"text_5e43869208f4be231ff75094e8a07e00\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "c67c1f42-d599-5ca7-a407-ac37e4012df6", "label": "ravi menon", "title": "{\"name\": \"ravi menon\", \"type\": \"Entity\", \"created_at\": 1782639594119, \"updated_at\": 1782639594119, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Team member\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "22fab239-b471-5089-a86e-4c943c662996", "label": "checkout latency fix", "title": "{\"name\": \"checkout latency fix\", \"type\": \"Entity\", \"created_at\": 1782639470052, \"updated_at\": 1782639470052, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Project to fix checkout latency issue\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "ed098e70-7598-5ee9-a836-d175d95aae72", "label": "project", "title": "{\"name\": \"project\", \"type\": \"EntityType\", \"created_at\": 1782639594121, \"updated_at\": 1782639594122, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"project\", \"relations\": []}"}, {"id": "e216e0a7-0d35-543d-a41a-e5521b131db4", "label": "text_5e43869208f4be231ff75094e8a07e\u2026", "title": "{\"name\": \"text_5e43869208f4be231ff75094e8a07e00\", \"type\": \"TextDocument\", \"created_at\": 1782639468182, \"updated_at\": 1782639468182, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 1, \"metadata\": {\"index_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"classify_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"5e43869208f4be231ff75094e8a07e00\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"raw_data_location\": \"file:///C:/Users/LENOVO/AppData/Local/Programs/Python/Python314/Lib/site-packages/cognee/.data_storage/text_5e43869208f4be231ff75094e8a07e00.txt\", \"external_metadata\": \"{}\", \"mime_type\": \"text/plain\"}"}, {"id": "21284c4a-7036-5549-ba68-1e5de7d45213", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639469049, \"updated_at\": 1782639469049, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"2fb1b2c3cd691ac485d7b897d07baeca\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This PR implements async email dispatch using Redis/Celery queue. \\n   * The PR #42 was authored by @priya-sharma and merged on 2024-08-16.\\n   * It changes the email_service component.\\n   * The solution moves email sending out of the HTTP request-response cycle and introduces a Celery worker for SMTP dispatch.\\n   * The checkout endpoint now returns 200 immediately after writing the order to the database.\", \"source_chunk_id\": \"49861280-c2c6-5a12-a436-128a1d6f4d15\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "49861280-c2c6-5a12-a436-128a1d6f4d15", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468214, \"updated_at\": 1782639468214, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"2fb1b2c3cd691ac485d7b897d07baeca\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: PR] [file: PR-42-implement-async-email.md]\\n\\n# PR #42 \\u2014 feat: async email dispatch via Redis/Celery queue\\n\\n**Author:** @priya-sharma  \\n**Date:** 2024-08-16  \\n**Status:** Merged  \\n**Component:** email_service  \\n\\n## Summary\\n\\nImplements the async email dispatch architecture decided in ADR-001.\\n\\nMoves email sending out of the HTTP request-response cycle. The checkout endpoint\\nnow returns 200 immediately after writing the order to the database. A Celery worker\\nhandles SMTP dispatch with exponential backoff (3 retries, max 60s delay).\\n\\n## Changes\\n\\n- `email_service/tasks.py`: new Celery task `send_order_confirmation(order_id)`\\n- `checkout/views.py`: remove direct `send_email()` call; replace with `send_order_confirmation.delay(order.id)`\\n- `email_service/worker.py`: Celery app config with Redis broker\\n- `reconciliation/jobs.py`: daily job to resend missing confirmation emails\\n- `docker-compose.yml`: add `celery-worker` and `celery-beat` services\\n\\n## Benchmarks\\n\\n| Metric | Before | After |\\n|--------|--------|-------|\\n| Checkout p95 latency | 1,340ms | 541ms |\\n| Email delivery rate | 99.1% (sync) | 99.7% (async + retry) |\\n\\n## Implements\\n\\nADR-001: Use Asynchronous Email Dispatch via Queue\", \"chunk_size\": 392, \"chunk_index\": 0, \"cut_type\": \"sentence_cut\", \"document_id\": \"409492c8-3e5f-5d7e-8688-7a848e5e6458\", \"document_name\": \"text_2fb1b2c3cd691ac485d7b897d07baeca\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "9d8b0306-5bee-5f9d-bb41-9cd0c49cb570", "label": "pr #42", "title": "{\"name\": \"pr #42\", \"type\": \"Entity\", \"created_at\": 1782639470144, \"updated_at\": 1782639470144, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"feat: async email dispatch via Redis/Celery queue\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "4b514ba8-4709-5698-9d9e-28920dd1f6fa", "label": "2024-08-16", "title": "{\"name\": \"2024-08-16\", \"type\": \"Entity\", \"created_at\": 1782639470145, \"updated_a n\"}"}, {"id": "b2b5fbb3-857d-5052-a9f3-10af35ff4678", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639494863, \"updated_at\": 1782639494863, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"7825dbcc70fd594162bec102b36082cf\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This Architectural Decision Record (ADR) is about database choices and technical decisions. \\n      * The ADR-002 decision is to use PostgreSQL for transactional order data.\\n      * The choice was made over MongoDB and CockroachDB for its ACID transactions and mature tooling.\\n      * The decision has positive consequences such as full ACID guarantees and a reliable audit trail, \\n        but also has negative consequences such as stricter schema requirements and harder horizontal write-scaling.\", \"source_chunk_id\": \"0e50cd49-a6ae-5583-adbc-4556f232f6e2\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "0e50cd49-a6ae-5583-adbc-4556f232f6e2", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468179, \"updated_at\": 1782639468179, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"7825dbcc70fd594162bec102b36082cf\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: ADR] [file: ADR-002-postgres-not-nosql.md]\\n\\n# ADR-002: Use PostgreSQL for Transactional Order Data (Not MongoDB)\\n\\n**Status:** Accepted  \\n**Date:** 2024-05-09  \\n**Author:** @daniel-osei  \\n**Component:** orders_service, payments_service  \\n\\n## Context\\n\\nDuring the v2 data-layer redesign we debated the storage backend for `orders` and `payments`\\ntables. The team had prior MongoDB experience and proposed using a document store to avoid\\nrigid schemas and speed up early iteration. Three options were evaluated:\\n\\n1. **MongoDB** \\u2014 flexible schema, familiar to the team, no migration tooling needed.\\n2. **PostgreSQL** \\u2014 ACID transactions, mature tooling, strict schema enforced at DB level.\\n3. **CockroachDB** \\u2014 distributed ACID, but adds operational complexity we don't need at our scale.\\n\\n## Decision\\n\\nWe adopt **PostgreSQL** for all transactional tables (`orders`, `payments`, `refunds`).\\n\\nProduct catalog, search indexes, and analytics event stores may use document/columnar\\nstores where appropriate \\u2014 that is out of scope here. This ADR governs only financial\\nand order-state data.\\n\\n## Consequences\\n\\n- **Positive:** Full ACID guarantees \\u2014 an order can't be written without a matching payment\\n  row; a refund can't partially update. Multi-table writes are atomic.\\n- **Positive:** Foreign-key constraints prevent orphaned records at the database level.\\n  MongoDB enforces nothing; application bugs become silent data corruption.\\n- **Positive:** `pg_audit` and WAL-based CDC (Debezium) give us a reliable audit trail\\n  required for PCI-DSS compliance audits.\\n- **Negative:** Stricter schema requires migration scripts on every model change. Accepted \\u2014\\n  Alembic auto-generates migrations; review cost is low.\\n- **Negative:** Horizontal write-scaling is harder than MongoDB sharding. Accepted \\u2014 we\\n  are at ~400 orders/minute peak; vertical Postgres handles this comfortably to 10\\u00d7 that.\\n\\n## Rationale (the WHY)\\n\\nPayment and order data is the highest-stakes data we own. A missed transaction or\\npartially-applied refund is a customer-trust and compliance failure, not an eventual-\\nconsistency footnote. MongoDB's document model is excellent for flexible, high-volume,\\nnon-transactional workloads \\u2014 but it is the wrong tool when atomicity across multiple\\nentities is a hard requirement.\\n\\nThe \\\"flexible schema\\\" argument for MongoDB is also a liability here: we *want* the DB\\nto reject malformed writes that application code lets through. The schema is load-bearing.\\n\\nThis is an explicit, non-obvious choice to accept migration overhead in exchange for\\ncorrectness guarantees. Revisit only if horizontal write volume exceeds 10k orders/min.\\n\", \"chunk_size\": 669, \"chunk_index\": 0, \"cut_type\": \"paragraph_end\", \"document_id\": \"d53299dc-1258-5bfb-9807-28484c3928cf\", \"document_name\": \"text_7825dbcc70fd594162bec102b36082cf\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "879c3481-34ce-5a6a-ad4a-8fca2572f891", "label": "2024-05-09", "title": "{\"name\": \"2024-05-09\", \"type\": \"Entity\", \"created_at\": 1782639528569, \"updated_at\": 1782639528569, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Date of ADR-002\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "7bda00d4-0078-5951-81ef-3c4f495a42ac", "label": "postgres", "title": "{\"name\": \"postgres\", \"type\": \"Entity\", \"created_at\": 1782639594121, \"updated_at\": 1782639594121, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Relational database\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "380e873e-adf3-5bbc-b96e-8aca49d18114", "label": "cockroachdb", "title": "{\"name\": \"cockroachdb\", \"type\": \"Entity\", \"created_at\": 1782639528570, \"updated_at\": 1782639528570, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Distributed relational database\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "d53299dc-1258-5bfb-9807-28484c3928cf", "label": "text_7825dbcc70fd594162bec102b36082\u2026", "title": "{\"name\": \"text_7825dbcc70fd594162bec102b36082cf\", \"type\": \"TextDocument\", \"created_at\": 1782639468168, \"updated_at\": 1782639468168, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 1, \"metadata\": {\"index_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"classify_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"7825dbcc70fd594162bec102b36082cf\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"raw_data_location\": \"file:///C:/Users/LENOVO/AppData/Local/Programs/Python/Python314/Lib/site-packages/cognee/.data_storage/text_7825dbcc70fd594162bec102b36082cf.txt\", \"external_metadata\": \"{}\", \"mime_type\": \"text/plain\"}"}, {"id": "24dc90f2-68fd-5a1e-bc02-956d1b7c5ded", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639494213, \"updated_at\": 1782639494213, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"9b84ca94401639266c16ff67ef3c4679\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This chunk is about: \\n* Topics: API Gateway, Rate Limiting, Application Code \\n* Concepts: Security, Performance. \\nFacts: \\n- The team decided to enforce rate limiting at the API gateway layer instead of in application code.\\n- The rate limiting is enforced using Nginx limit_req_zone for self-hosted deployments and Kong rate-limit plugin for cloud deployments.\\n- Application code is not allowed to contain throttle decorators or middleware for rate limiting, with this responsibility belonging to the gateway.\", \"source_chunk_id\": \"0f2a5398-c8bb-591a-b6e9-f87a522e94b3\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "0f2a5398-c8bb-591a-b6e9-f87a522e94b3", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468140, \"updated_at\": 1782639468140, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"9b84ca94401639266c16ff67ef3c4679\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: ADR] [file: ADR-003-gateway-rate-limiting.md]\\n\\n# ADR-003: Enforce Rate Limiting at the API Gateway, Not in Application Code\\n\\n**Status:** Accepted  \\n**Date:** 2024-03-22  \\n**Author:** @ravi-menon  \\n**Component:** api_gateway, all public endpoints  \\n\\n## Context\\n\\nAfter a scraping incident that saturated the `/search` endpoint (12k req/s from 3 IPs,\\ncausing p99 > 8s for legitimate users), the team agreed that rate limiting was non-negotiable.\\nWe debated where to enforce it:\\n\\n1. **Application middleware** (Django `django-ratelimit` or DRF throttle classes) \\u2014 easy to\\n   add per-view, lives next to the business logic.\\n2. **API gateway layer** (Nginx `limit_req`, Kong rate-limit plugin, or AWS WAF) \\u2014 enforcement\\n   before the request touches Python; blocks at the edge.\\n3. **Redis-backed distributed counter in app code** \\u2014 hybrid: app logic, shared state.\\n\\n## Decision\\n\\nWe enforce rate limits **at the gateway layer** (Nginx `limit_req_zone` for self-hosted;\\nKong rate-limit plugin for cloud deployments). Application code contains **no throttle\\ndecorators or middleware** for rate limiting \\u2014 that responsibility belongs to the gateway.\\n\\n## Consequences\\n\\n- **Positive:** Abusive requests are dropped before they consume a Python worker, DB\\n  connection, or any application resource. The 12k-req burst would have been absorbed at\\n  the gateway; zero Django workers would have been touched.\\n- **Positive:** Rate limit config lives in one place (gateway config). Changing a limit\\n  doesn't require a code deploy, test cycle, or PR \\u2014 ops can hot-reload Nginx config.\\n- **Positive:** Consistent enforcement across all services regardless of language or\\n  framework. A new microservice is automatically covered.\\n- **Negative:** Per-user / per-route granularity is coarser at Nginx level than in app\\n  middleware. Mitigated: Kong's rate-limit plugin supports per-consumer, per-route rules.\\n- **Negative:** Local dev environment must run Nginx or Kong to test realistic limiting.\\n  Mitigated: `docker-compose.yml` includes a dev gateway service.\\n\\n## Rationale (the WHY)\\n\\nRate limiting in application code is *defense in depth*, not a primary defense. If the\\nlimit is enforced in Django middleware, the abusive request has already: opened a socket,\\ncompleted TLS, been parsed by Nginx/uWSGI, spawned a Python coroutine, and hit the ORM\\nconnection pool \\u2014 before being rejected. We spend ~40ms of expensive compute to say \\\"no.\\\"\\n\\nEnforcing at the gateway drops the request at the edge with <1ms overhead and no\\napplication-layer cost. The scraping incident proved this matters: 12k req/s of \\\"rejected\\nin middleware\\\" would still saturate our worker pool.\\n\\nApplication-layer throttle decorators (`@ratelimit`, DRF `throttle_classes`) are explicitly\\n**banned** for public endpoints. If you find yourself adding one, re-read this ADR and\\nimplement the limit in the gateway config instead.\\n\", \"chunk_size\": 761, \"chunk_index\": 0, \"cut_type\": \"paragraph_end\", \"document_id\": \"b6c159d4-6ed8-508b-b24d-8c78c426a059\", \"document_name\": \"text_9b84ca94401639266c16ff67ef3c4679\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "529a4d95-7682-50dc-a07f-e664418cf278", "label": "adr", "title": "{\"name\": \"adr\", \"type\": \"EntityType\", \"created_at\": 1782639528888, \"updated_at\": 1782639528888, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"adr\", \"relations\": []}"}, {"id": "94564128-a5e3-5ffa-9aa9-4e6bf5a8a38e", "label": "api gateway", "title": "{\"name\": \"api gateway\", \"type\": \"Entity\", \"created_at\": 1782639528889, \"updated_at\": 1782639528889, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Component responsible for enforcing rate limiting\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "6ad28e34-e2e8-53f1-a01c-864d40db2a78", "label": "library", "title": "{\"name\": \"library\", \"type\": \"EntityType\", \"created_at\": 1782639528889, \"updated_at\": 1782639528889, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"library\", \"relations\": []}"}, {"id": "0c6c8f34-69a2-5cc3-b923-237939776c58", "label": "kong", "title": "{\"name\": \"kong\", \"type\": \"Entity\", \"created_at\": 1782639527718, \"updated_at\": 1782639527718, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Kong is a software\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "9720f9c0-bfc8-56f1-8d05-784e6d7e21e5", "label": "aws waf", "title": "{\"name\": \"aws waf\", \"type\": \"Entity\", \"created_at\": 1782639528890, \"updated_at\": 1782639528890, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Web application firewall with rate limiting capabilities\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "289b2573-75b4-5e8b-abb1-4414c07ec3f5", "label": "2024-03-22", "title": "{\"name\": \"2024-03-22\", \"type\": \"Entity\", \"created_at\": 1782639528891, \"updated_at\": 1782639528891, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Date when ADR-003 was accepted\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "e95c1be2-6cdb-5a0a-9385-a19a1d50d2c6", "label": "django ratelimit", "title": "{\"name\": \"django ratelimit\", \"type\": \"Entity\", \"created_at\": 1782639528889, \"updated_at\": 1782639528889, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Library for rate limiting in Django\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "b6c159d4-6ed8-508b-b24d-8c78c426a059", "label": "text_9b84ca94401639266c16ff67ef3c46\u2026", "title": "{\"name\": \"text_9b84ca94401639266c16ff67ef3c4679\", \"type\": \"TextDocument\", \"created_at\": 1782639468127, \"updated_at\": 1782639468127, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 1, \"metadata\": {\"index_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"classify_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"9b84ca94401639266c16ff67ef3c4679\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"raw_data_location\": \"file:///C:/Users/LENOVO/AppData/Local/Programs/Python/Python314/Lib/site-packages/cognee/.data_storage/text_9b84ca94401639266c16ff67ef3c4679.txt\", \"external_metadata\": \"{}\", \"mime_type\": \"text/plain\"}"}, {"id": "c1c0ec5b-45b8-51fe-9065-7db94611100d", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639592712, \"updated_at\": 1782639592712, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"975f06374b3f3123be4d8afb68e74b96\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This chunk is about People: Ravi Menon, Priya Sharma, Daniel Osei, Ananya Krishna, and Topics: rate limiting, incident post-mortem, Slack channel #incidents. \\nFacts: \\n- Ravi Menon started a post-mortem thread after the system was hit by ~12k req/s from 3 IPs targeting /search.\\n- Priya Sharma added @ratelimit decorators to search and products views as an emergency patch.\\n- Daniel Osei suggested using Nginx limit_req_zone to handle rate limiting at the edge.\\n- Ravi Menon will write ADR-003 and PR the Nginx config to implement rate limiting at the gateway level.\", \"source_chunk_id\": \"e184e35b-395b-558d-9725-038e05a7b52a\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "e184e35b-395b-558d-9725-038e05a7b52a", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468204, \"updated_at\": 1782639468204, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"975f06374b3f3123be4d8afb68e74b96\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: Slack] [file: slack-2024-03-rate-limiting.md]\\n\\n# Slack Export \\u2014 #incidents \\u2014 March 2024\\n\\n**Channel:** #incidents  \\n**Date:** 2024-03-21  \\n**Topic:** Scraping incident post-mortem + rate limiting decision\\n\\n---\\n\\n**@ravi-menon** [2:03 PM]  \\nIncident post-mortem thread. We just got hit by ~12k req/s from 3 IPs targeting /search.\\nWorkers saturated for 22 minutes. p99 hit 8.1 seconds. Conversion dropped ~31% during\\nthe window.\\n\\n**@priya-sharma** [2:06 PM]  \\nI added `@ratelimit` decorators to search and products views as an emergency patch.\\nIt's live but it's a bandage \\u2014 requests still hit Django workers before getting rejected.\\nWe need a real solution.\\n\\n**@ravi-menon** [2:09 PM]  \\nRight. The problem with middleware rate limiting is that the abusive request has already:\\nopened a socket, done TLS, been parsed by uWSGI, allocated a thread, hit the middleware\\nchain \\u2014 *then* we say no. At 12k req/s that's still 12k connections per second burning\\nresources.\\n\\n**@daniel-osei** [2:13 PM]  \\nNginx `limit_req_zone`. Drop it at the edge before it reaches Python at all. I've seen\\nthis handle 100k req/s on a $20 VPS. Gateway enforcement is the right answer.\\n\\n**@ananya-krishna** [2:17 PM]  \\nAgreed. Also makes ops simpler \\u2014 change a limit = edit nginx config + reload. No code\\ndeploy, no test cycle, no PR. Oncall can adjust limits at 3am without waking up a dev.\\n\\n**@priya-sharma** [2:19 PM]  \\nWhat about per-user granularity? Nginx limit_req is per-IP. Authenticated users could\\nhave different limits.\\n\\n**@ravi-menon** [2:22 PM]  \\nKong rate-limit plugin handles per-consumer. We can route authenticated traffic through\\nKong consumer groups. Anonymous traffic gets the IP-based limit.\\n\\n**@daniel-osei** [2:25 PM]  \\nThe key principle I want captured in the ADR: rate limiting in application code is\\ndefense-in-depth, not primary defense. Primary defense is at the edge. The `@ratelimit`\\ndecorators we added today should be removed once the gateway config is in.\\n\\n**@ravi-menon** [2:27 PM]  \\nAgreed. I'll write ADR-003 and PR the Nginx config. The decorators in the app code come\\nout in that same PR. We don't want two rate-limiting systems \\u2014 that's how you get\\ninconsistent behavior and false confidence.\\n\\n**@ananya-krishna** [2:30 PM]  \\nWorth calling out explicitly in the ADR that adding `@ratelimit` or DRF `throttle_classes`\\nto public endpoints is banned. If someone's tempted to add one, they should be implementing\\na gateway rule instead.\\n\\n**@ravi-menon** [2:32 PM]  \\nWill do. Making it explicit. The incident cost us real conversion revenue \\u2014 I want future\\ndevs to understand *why* this isn't a decoration choice.\\n\", \"chunk_size\": 755, \"chunk_index\": 0, \"cut_type\": \"paragraph_end\", \"document_id\": \"161a6e29-e657-5105-ae61-aa176fef28ae\", \"document_name\": \"text_975f06374b3f3123be4d8afb68e74b96\", \"truth_alignment\": null, \"truth_epoch\": null}"}, {"id": "5b3a138c-5f4e-521e-a158-dc6e981ab020", "label": "django", "title": "{\"name\": \"django\", \"type\": \"Entity\", \"created_at\": 1782639527719, \"updated_at\": 1782639527719, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Django is a software\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "b9e7e2b7-0294-5cdd-a2c6-a4dd0bbef37e", "label": "ananya krishna", "title": "{\"name\": \"ananya krishna\", \"type\": \"Entity\", \"created_at\": 1782639594120, \"updated_at\": 1782639594120, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Team member\", \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "3d89ed10-a93a-57c5-8a13-f541689a7459", "label": "slack", "title": "{\"name\": \"slack\", \"type\": \"Entity\", \"created_at\": 1782639527720, \"updated_at\": 1782639527720, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 0, \"metadata\": {\"index_fields\": [\"name\"], \"identity_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_from_data\", \"source_node_set\": null, \"source_user\": null, \"source_content_hash\": null, \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"description\": \"Slack is a software\", \"relations\": [], \"truth_alignment\": null, \"truth_subspace_signature\": null, \"truth_epoch\": null}"}, {"id": "161a6e29-e657-5105-ae61-aa176fef28ae", "label": "text_975f06374b3f3123be4d8afb68e74b\u2026", "title": "{\"name\": \"text_975f06374b3f3123be4d8afb68e74b96\", \"type\": \"TextDocument\", \"created_at\": 1782639468191, \"updated_at\": 1782639468191, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 1, \"metadata\": {\"index_fields\": [\"name\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"classify_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"975f06374b3f3123be4d8afb68e74b96\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"raw_data_location\": \"file:///C:/Users/LENOVO/AppData/Local/Programs/Python/Python314/Lib/site-packages/cognee/.data_storage/text_975f06374b3f3123be4d8afb68e74b96.txt\", \"external_metadata\": \"{}\", \"mime_type\": \"text/plain\"}"}, {"id": "3c0515ee-7a18-5714-8a03-0bc36f6dae84", "label": "TextSummary", "title": "{\"name\": \"\", \"type\": \"TextSummary\", \"created_at\": 1782639478331, \"updated_at\": 1782639478331, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 3, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_graph_and_summarize\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"a2eefc0a4779f507ecba4a9c5efe6e91\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"This chunk is about database choice for orders and payments redesign in the #backend-decisions channel. \\n   Key points:\\n   - The team decides to use Postgres over Mongo for orders and payments due to its support for ACID transactions and foreign key constraints.\\n   - Postgres is chosen for its ability to enforce data consistency and integrity, particularly for financial data.\\n   - The decision is influenced by the results of a chaos test, which showed that 0.4% of writes in the Mongo path ended up in an inconsistent state during a simulated network partition.\\n   - The team also considers the upcoming PCI-DSS audit and the need for a standard setup with WAL-based change-data-capture, which Postgres + Debezium provides.\", \"source_chunk_id\": \"a63bda5b-5f2e-5ac6-8323-493ed0221e06\", \"summarized_in\": null, \"global_context_bucket_id\": null}"}, {"id": "a63bda5b-5f2e-5ac6-8323-493ed0221e06", "label": "DocumentChunk", "title": "{\"name\": \"\", \"type\": \"DocumentChunk\", \"created_at\": 1782639468155, \"updated_at\": 1782639468155, \"ontology_valid\": false, \"version\": 1, \"topological_rank\": 2, \"metadata\": {\"index_fields\": [\"text\"]}, \"belongs_to_set\": null, \"source_pipeline\": \"cognify_pipeline\", \"source_task\": \"extract_chunks_from_documents\", \"source_node_set\": null, \"source_user\": \"default_user@example.com\", \"source_content_hash\": \"a2eefc0a4779f507ecba4a9c5efe6e91\", \"feedback_weight\": 0.5, \"importance_weight\": 0.5, \"text\": \"[source_type: Slack] [file: slack-2024-05-database-choice.md]\\n\\n# Slack Export \\u2014 #backend-decisions \\u2014 May 2024\\n\\n**Channel:** #backend-decisions  \\n**Date:** 2024-05-07  \\n**Topic:** Database choice for v2 orders + payments redesign\\n\\n---\\n\\n**@ravi-menon** [9:14 AM]  \\nBefore Daniel's ADR lands \\u2014 can we do a quick gut-check on Mongo vs Postgres for orders?\\nHalf the team has been assuming we'd stay on Mongo since that's what we know.\\n\\n**@daniel-osei** [9:19 AM]  \\nI pushed hard for Postgres here. Let me explain the core reason: we can't do a real\\nmulti-document transaction in Mongo without the 4.0+ multi-document transaction API, which\\nadds overhead and still doesn't give us FK integrity. An order without a payment row is\\ninvalid \\u2014 I want the *database* to enforce that, not us.\\n\\n**@priya-sharma** [9:22 AM]  \\nAgree with Daniel. The chaos test last sprint was the eye-opener for me. 0.4% of writes\\nin the Mongo path ended up in inconsistent state during simulated network partition. That's\\nnot acceptable for payments data. We'd need an application-level saga pattern to fix it,\\nwhich is way more complexity than just using Postgres.\\n\\n**@ravi-menon** [9:25 AM]  \\nWhat about schema flexibility? We change the order model pretty often. Migration scripts\\nfeel like overhead.\\n\\n**@daniel-osei** [9:29 AM]  \\nAlembic auto-generates them in 30 seconds. The \\\"flexibility\\\" argument for Mongo really\\nmeans \\\"we can write inconsistent data without the DB complaining.\\\" That's not a feature\\nfor payments \\u2014 it's a liability. We *want* the schema to be a contract.\\n\\n**@ananya-krishna** [9:33 AM]  \\nAlso worth noting \\u2014 PCI-DSS audit in Q3. Auditors want WAL-based change-data-capture.\\nPostgres + Debezium is a standard pattern. Mongo change streams can work but we'd be\\nexplaining a non-standard setup to the auditors. Not worth it.\\n\\n**@ravi-menon** [9:36 AM]  \\nThat settles it for me. ACID + FK constraints + audit trail. Postgres it is.\\nDaniel, write the ADR so this doesn't get re-litigated in 6 months.\\n\\n**@daniel-osei** [9:38 AM]  \\nOn it. ADR-002, drafting now. Key point I'll make explicit: this decision is specifically\\nfor transactional financial data. Product catalog, events, analytics \\u2014 we can revisit\\ndocument stores for those. Orders and payments: Postgres, full stop.\\n\\n**@ananya-krishna** [9:41 AM]  \\n+1. Please also include the chaos test numbers. If someone proposes Mongo for orders\\nagain they should have to disprove those numbers first.\\n\", \"chunk_size\": 680,
