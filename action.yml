name: "Sentinel"
description: "Catch PRs that silently reverse a past engineering decision, and explain why it was made."
branding:
  icon: "shield"
  color: "purple"

inputs:
  mode:
    description: "dry-run (print + job summary) or post (comment on the PR)"
    required: false
    default: "dry-run"
  pr-file:
    description: "Optional path to a PR markdown file (local testing; otherwise uses the PR event)"
    required: false
    default: ""
  github-token:
    description: "Token used to post the comment (only needed for mode=post)"
    required: false
    default: ${{ github.token }}
  groq-api-key:
    description: "Groq API key used for LLM reasoning"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"
    - shell: bash
      env:
        SENTINEL_MODE: ${{ inputs.mode }}
        SENTINEL_PR_FILE: ${{ inputs.pr-file }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
      run: python "${{ github.action_path }}/scripts/action_entrypoint.py"

# NOTE: detection uses Groq for reasoning and local Ollama for embeddings. Use a
# self-hosted runner with `ollama serve` and `nomic-embed-text` pulled.
