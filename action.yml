name: "Sentinel"
description: "Catch PRs that silently reverse a past engineering decision, and explain why it was made."
branding:
  icon: "shield"
  color: "purple"

inputs:
  mode:
    description: "dry-run (print + job summary) or post (comment on the PR)"
    required: false
    default: "dry-run"
  pr-file:
    description: "Optional path to a PR markdown file (local testing; otherwise uses the PR event)"
    required: false
    default: ""
  github-token:
    description: "Token used to post the comment (only needed for mode=post)"
    required: false
    default: ${{ github.token }}
  # ── LLM posture ──────────────────────────────────────────────────────────
  # Default: fully local reasoning via Ollama on the self-hosted runner — no API
  # key, no rate limits, nothing leaves the box. To use a hosted LLM instead set
  # llm-provider (openai for OpenAI; custom for Groq cloud) + llm-api-key.
  # Embeddings stay local (Ollama nomic-embed-text) regardless of llm-provider.
  llm-provider:
    description: "ollama (local, default), openai (OpenAI cloud), or custom (e.g. Groq cloud)"
    required: false
    default: "ollama"
  llm-model:
    description: "Reasoning model (ollama: e.g. qwen2.5:3b; openai: gpt-4o-mini; Groq: groq/llama-3.3-70b-versatile)"
    required: false
    default: "qwen2.5:3b"
  llm-endpoint:
    description: "LLM endpoint (local Ollama OpenAI-compatible API by default; ignored for openai)"
    required: false
    default: "http://localhost:11434/v1"
  llm-instructor-mode:
    description: "Instructor mode for structured output; json_schema_mode is required for small local models"
    required: false
    default: "json_schema_mode"
  llm-api-key:
    description: "API key for a hosted llm-provider (OpenAI/Groq). Leave empty for local ollama."
    required: false
    default: ""
  groq-api-key:
    description: "Deprecated alias for llm-api-key (Groq cloud). Prefer llm-api-key."
    required: false
    default: ""
  # ── Embeddings ───────────────────────────────────────────────────────────
  # Default: local Ollama (nomic-embed-text) — needs a self-hosted runner with Ollama.
  # Set embedding-provider: openai (text-embedding-3-small) to run on a GitHub-hosted
  # runner with no Ollama — fully OpenAI, nothing local.
  embedding-provider:
    description: "ollama (local, default) or openai (OpenAI cloud — no Ollama needed)"
    required: false
    default: "ollama"
  embedding-model:
    description: "Embedding model (ollama: nomic-embed-text; openai: text-embedding-3-small)"
    required: false
    default: "nomic-embed-text"
  embedding-dimensions:
    description: "Embedding vector size (ollama nomic: 768; openai text-embedding-3-small: 1536)"
    required: false
    default: "768"
  embedding-api-key:
    description: "API key for a hosted embedding provider (OpenAI). Leave empty for local ollama."
    required: false
    default: ""
  # ── Memory sources (the `remember` phase) ─────────────────────────────────
  # Sentinel builds institutional memory from the repo's REAL history: decision docs
  # in the checkout + merged PRs via the GitHub API. No seeded files.
  ingest-prs:
    description: "Ingest the repo's merged PRs (the real 'why') into memory"
    required: false
    default: "true"
  pr-limit:
    description: "How many recent merged PRs to ingest"
    required: false
    default: "25"
  doc-globs:
    description: "Comma-separated globs (repo-root relative) for decision docs to ingest"
    required: false
    default: "docs/adr/*.md,docs/decisions/*.md,docs/rfcs/*.md,ADR-*.md"
  slack-export-dir:
    description: "Optional path to attached Slack-export markdown (the Slack connector)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"
    - shell: bash
      env:
        SENTINEL_MODE: ${{ inputs.mode }}
        SENTINEL_PR_FILE: ${{ inputs.pr-file }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        LLM_MODEL: ${{ inputs.llm-model }}
        LLM_ENDPOINT: ${{ inputs.llm-endpoint }}
        LLM_INSTRUCTOR_MODE: ${{ inputs.llm-instructor-mode }}
        # cognee requires LLM_API_KEY present at import even for Ollama; fall back to a
        # placeholder when no real (OpenAI/Groq) key is supplied.
        LLM_API_KEY: ${{ inputs.llm-api-key || inputs.groq-api-key || 'ollama' }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        EMBEDDING_PROVIDER: ${{ inputs.embedding-provider }}
        EMBEDDING_MODEL: ${{ inputs.embedding-model }}
        EMBEDDING_DIMENSIONS: ${{ inputs.embedding-dimensions }}
        EMBEDDING_API_KEY: ${{ inputs.embedding-api-key || inputs.llm-api-key }}
        # Memory sources (remember phase) — build the graph from the repo's real history.
        SENTINEL_INGEST_PRS: ${{ inputs.ingest-prs }}
        SENTINEL_PR_LIMIT: ${{ inputs.pr-limit }}
        SENTINEL_DOC_GLOBS: ${{ inputs.doc-globs }}
        SENTINEL_SLACK_DIR: ${{ inputs.slack-export-dir }}
      run: python "${{ github.action_path }}/scripts/action_entrypoint.py"

# NOTE: detection uses local Ollama for BOTH reasoning (qwen2.5:3b) and embeddings
# (nomic-embed-text) by default. Use a self-hosted runner with `ollama serve` and both
# models pulled:  ollama pull qwen2.5:3b nomic-embed-text
