# Sentinel runs on every PR — fully on GitHub, fully on OpenAI.
#
# Reasoning (gpt-4o-mini) AND embeddings (text-embedding-3-small) use the OpenAI API,
# so this runs on a standard GitHub-hosted runner — no self-hosted box, no Ollama.
#
# Add OPENAI_API_KEY to the repo's Actions secrets (Settings → Secrets and variables →
# Actions). mode: post has Sentinel comment its Memory Review card on the PR.

name: Sentinel

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write   # needed for mode: post
  contents: read

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Sentinel
        uses: ./
        with:
          mode: post
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # LLM: OpenAI gpt-4o-mini
          llm-provider: openai
          llm-model: gpt-4o-mini
          llm-endpoint: ""          # OpenAI's own endpoint, not local Ollama
          llm-api-key: ${{ secrets.OPENAI_API_KEY }}
          # Embeddings: OpenAI text-embedding-3-small (no Ollama)
          embedding-provider: openai
          embedding-model: text-embedding-3-small
          embedding-dimensions: "1536"
          embedding-api-key: ${{ secrets.OPENAI_API_KEY }}
