# Example workflow: run Sentinel on every PR.
#
# Sentinel uses Groq for reasoning (remote) and local Ollama for embeddings.
# This requires a SELF-HOSTED runner with Ollama running and models pulled:
#   ollama pull nomic-embed-text
#
# Add GROQ_API_KEY to your repo's Actions secrets (Settings → Secrets → Actions).
#
# Start in dry-run mode (comment printed to the job summary only). Switch to
# mode: post once you're happy, to have Sentinel comment on the PR.

name: Sentinel

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write   # needed for mode: post
  contents: read

jobs:
  sentinel:
    runs-on: self-hosted   # the machine running Ollama
    steps:
      - uses: actions/checkout@v4
      - name: Run Sentinel
        uses: ./
        with:
          mode: dry-run     # change to "post" to comment on the PR
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
